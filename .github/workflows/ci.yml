name: Rust CI (LLVM 21)

on:
  push:
  pull_request:

env:
  LLVM_VERSION: "21.1.8"
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_INCREMENTAL: 0

jobs:
  test-ubuntu:
    name: Test on Ubuntu (prebuilt LLVM image)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/llvm/libcxx-ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""

      - name: Export LLVM paths
        shell: bash
        run: |
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config)" >> "$GITHUB_ENV"
          echo "LLVM_SYS_211_PREFIX=$(llvm-config --prefix)" >> "$GITHUB_ENV"

      - name: Run tests
        shell: bash
        run: cargo test --all --verbose

  test-macos:
    name: Test on macOS (prebuilt LLVM tarball)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache prebuilt LLVM
        uses: actions/cache@v4
        id: llvm-cache
        with:
          path: ~/.cache/llvm/21.1.8
          key: llvm-21.1.8-${{ runner.os }}-${{ runner.arch }}

      - name: Download and unpack LLVM 21.1.8
        shell: bash
        run: |
          set -euo pipefail

          LLVM_PREFIX="$HOME/.cache/llvm/21.1.8"
          if [ ! -x "$LLVM_PREFIX/bin/llvm-config" ]; then
            mkdir -p "$LLVM_PREFIX"
            curl -L --retry 3 \
              -o /tmp/llvm-21.1.8-macos-arm64.tar.xz \
              "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.8/LLVM-21.1.8-macOS-ARM64.tar.xz"
            tar -xJf /tmp/llvm-21.1.8-macos-arm64.tar.xz -C "$LLVM_PREFIX" --strip-components=1
          fi

          echo "$LLVM_PREFIX/bin" >> "$GITHUB_PATH"
          echo "LLVM_SYS_211_PREFIX=$LLVM_PREFIX" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG_PATH=$LLVM_PREFIX/bin/llvm-config" >> "$GITHUB_ENV"

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""

      - name: Run tests
        shell: bash
        run: cargo test --all --verbose
