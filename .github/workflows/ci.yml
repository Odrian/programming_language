name: Rust CI (LLVM 21)

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.runner_os }}
    env:
      LLVM_VERSION: 21
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_INCREMENTAL: 0
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner_os: ubuntu-latest
            os: linux
          - runner_os: macos-latest
            os: macos
#          - runner_os: windows-latest
#            os: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""

      - name: Install LLVM 21 on Ubuntu
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release

          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${LLVM_VERSION}

          sudo apt-get update
          sudo apt-get install -y llvm-${LLVM_VERSION} llvm-${LLVM_VERSION}-dev llvm-${LLVM_VERSION}-tools
          sudo apt-get install -y gcc libpolly-${LLVM_VERSION}-dev

      - name: Cache Homebrew downloads
        if: matrix.os == 'macos'
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads                                                                                                                              
            ~/Library/Caches/Homebrew/api
          key: ${{ runner.os }}-homebrew-llvm-${{ env.LLVM_VERSION }}

      - name: Install LLVM 21 on macOS
        if: matrix.os == 'macos'
        shell: bash
        run: |
          brew update
          brew install llvm@21

          LLVM_PREFIX="$(brew --prefix llvm@21)"
          echo "$LLVM_PREFIX/bin" >> "$GITHUB_PATH"
          echo "LLVM_SYS_211_PREFIX=$LLVM_PREFIX" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG_PATH=$LLVM_PREFIX/bin/llvm-config" >> "$GITHUB_ENV"

#      - name: Install LLVM 21 on Windows
#        if: matrix.llvm_os == 'windows'
#        shell: pwsh
#        run: |
#          $version = "21.1.8"
#          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$version/clang+llvm-$version-x86_64-pc-windows-msvc.tar.xz"
#
#          Invoke-WebRequest -Uri $url -OutFile llvm.tar.xz
#          tar -xf llvm.tar.xz
#
#          $root = Get-ChildItem -Directory | Where-Object { $_.Name -like "clang+llvm-$version*" } | Select-Object -First 1
#          if (-not $root) { throw "LLVM archive directory not found" }
#
#          "LLVM_SYS_211_PREFIX=$($root.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
#          "LLVM_CONFIG_PATH=$($root.FullName)\bin\llvm-config.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
#          "$($root.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Run tests
        shell: bash
        run: cargo test --all
