name: Rust CI (with LLVM 21)

on:
  push:
  pull_request:

jobs:
  test:
    name: Test on ${{ matrix.os }} / ${{ matrix.rust }}
    runs-on: ${{ matrix.os }}
    env:
      LLVM_VERSION: 21
      CARGO_PROFILE_DEV_DEBUG: 0
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache APT archives
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-archives-llvm-${{ env.LLVM_VERSION }}-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-apt-archives-llvm-${{ env.LLVM_VERSION }}-

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""

      - name: Install LLVM 21 on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release

          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${LLVM_VERSION}

          sudo apt-get update
          sudo apt-get install -y llvm-${LLVM_VERSION} llvm-${LLVM_VERSION}-dev llvm-${LLVM_VERSION}-tools
          sudo apt-get install -y gcc libpolly-${LLVM_VERSION}-dev

      - name: Run tests
        run: cargo test --all --verbose
