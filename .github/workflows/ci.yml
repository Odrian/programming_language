name: Rust CI (with LLVM 21)

on:
  push:
  pull_request:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      LLVM_VERSION: 21
      CARGO_PROFILE_DEV_DEBUG: 0
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            llvm_os: linux
          - os: macos-latest
            llvm_os: macos
          - os: windows-latest
            llvm_os: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""

      - name: Install LLVM 21 on Ubuntu
        if: matrix.llvm_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release

          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${LLVM_VERSION}

          sudo apt-get update
          sudo apt-get install -y llvm-${LLVM_VERSION} llvm-${LLVM_VERSION}-dev llvm-${LLVM_VERSION}-tools
          sudo apt-get install -y gcc libpolly-${LLVM_VERSION}-dev

      - name: Install LLVM 21 on macOS
        if: matrix.llvm_os == 'macos'
        run: |
          brew update
          brew install llvm@21

          LLVM_PREFIX="$(brew --prefix llvm@21)"
          echo "$LLVM_PREFIX/bin" >> "$GITHUB_PATH"
          echo "LLVM_SYS_211_PREFIX=$LLVM_PREFIX" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG_PATH=$LLVM_PREFIX/bin/llvm-config" >> "$GITHUB_ENV"

      - name: Install LLVM 21 on Windows
        if: matrix.llvm_os == 'windows'
        shell: pwsh
        run: |
          $version = "21.1.8"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$version/LLVM-$version-win64.exe"

          Invoke-WebRequest -Uri $url -OutFile llvm.exe
          Start-Process -FilePath .\llvm.exe -ArgumentList "/S" -Wait

          Add-Content $env:GITHUB_PATH 'C:\Program Files\LLVM\bin'
          "LLVM_SYS_211_PREFIX=C:\Program Files\LLVM" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LLVM_CONFIG_PATH=C:\Program Files\LLVM\bin\llvm-config.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run tests
        shell: bash
        run: cargo test --all --verbose
