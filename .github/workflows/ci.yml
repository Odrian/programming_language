name: Rust CI (with LLVM 21)

on:
  push:
  pull_request:

jobs:
  test:
    name: Test on ${{ matrix.os }} / ${{ matrix.rust }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
#        os: [ubuntu-latest, macos-latest, windows-latest]
        os: [ubuntu-latest]
        rust: [stable]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 21 on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: |
          LLVM_VERSION=21

          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common curl

          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${LLVM_VERSION}

          sudo apt-get update
          sudo apt-get install -y clang-${LLVM_VERSION} lld-${LLVM_VERSION} llvm-${LLVM_VERSION} llvm-${LLVM_VERSION}-dev llvm-${LLVM_VERSION}-tools

          sudo apt-get install -y libpolly-${LLVM_VERSION}-dev

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-
            ${{ runner.os }}-cargo-

      - name: Show llvm-config version
        run: |
          echo "Using LLVM_CONFIG_PATH=$LLVM_CONFIG_PATH"
          if [ -n "$LLVM_CONFIG_PATH" ]; then
            $LLVM_CONFIG_PATH --version || true
          else
            llvm-config --version || true
          fi
        shell: bash

      - name: Run clippy (optional)
        run: |
          rustup component add clippy --toolchain ${{ matrix.rust }} || true
          cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Run tests
        run: cargo test --all --verbose
        env:
          LLVM_CONFIG_PATH: ${{ env.LLVM_CONFIG_PATH || '' }}
